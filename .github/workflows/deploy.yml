name: Deploy to Google Cloud Run & Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVICE_NAME: nexopos-backend
  REGION: us-central1

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Log in to Google Cloud using the service account key
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Set up gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Resolve and explicitly set the project from the authenticated credentials
      - name: Set GCP Project
        run: |
          PROJECT=$(gcloud config get-value project)
          echo "Resolved GCP Project: $PROJECT"
          gcloud config set project $PROJECT
          echo "GCP_PROJECT=$PROJECT" >> $GITHUB_ENV

      # Ensure Cloud Run API is enabled
      - name: Ensure Cloud Run API is enabled
        run: |
          if gcloud services list --enabled --project "$GCP_PROJECT" --filter="config.name=run.googleapis.com" --format="value(config.name)" | grep -q 'run.googleapis.com'; then
            echo "Cloud Run API is already enabled."
          else
            echo "Cloud Run API is not enabled. Attempting to enable..."
            gcloud services enable run.googleapis.com --project "$GCP_PROJECT" || {
              echo "ERROR: Unable to enable Cloud Run API. Ensure the service account has roles/serviceusage.serviceUsageAdmin or enable run.googleapis.com manually in the project." >&2
              exit 1
            }
          fi

      # Deploy to Cloud Run using the resolved project
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source . \
            --project $GCP_PROJECT \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="RUN_MIGRATIONS=true" \
            --quiet

      # Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: ${{ env.GCP_PROJECT }}
          channelId: live
